name: IndexNow + Sitemap Ping

# 색인 가속 자동화. 배포 직후 실행하여 신규 페이지 색인 1~2주 → 24h 단축 목표.
# - Google: sitemap ping 엔드포인트 (deprecated 됐지만 일부 보조 채널은 여전히 동작)
# - Bing/Yandex/Naver: IndexNow API 표준
#
# 운영자 액션 필요:
#  1. https://www.bing.com/indexnow 에서 키 발급 (32자리 hex)
#  2. {key}.txt 파일 (key 만 한 줄) 을 public/ 에 배치
#  3. GitHub Secrets에 INDEXNOW_KEY 등록
#  4. 워크플로 활성화

on:
  # main push 트리거 — 새 가이드/계산기 추가 또는 sitemap 변경 시 즉시 핑.
  # 'Cloudflare Pages' workflow_run 트리거는 외부 통합이라 GitHub workflow 가 아님 → 절대 작동 안 함.
  # main push 면 Cloudflare Pages 가 별도로 빌드·배포하고, 이 워크플로는 동시에 핑 발사 (병렬 안전).
  # 빌드·배포 완료 전이라도 IndexNow 는 sitemap URL 만 받으므로 무해 (Bing 이 자체 fetch).
  push:
    branches: [main]
    paths:
      - 'src/app/**/page.tsx'
      - 'src/app/sitemap.ts'
      - 'public/sitemap.xml'
  workflow_dispatch:  # 수동 실행도 허용

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (직전 커밋 diff 용 — fetch-depth 2)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect changed page URLs (직전 커밋의 src/app/**/page.tsx → 실제 URL)
        id: changed
        run: |
          # sitemap.xml 은 항상 포함 (URL 0개여도 sitemap 단독 전송).
          URLS='"https://calculatorhost.com/sitemap.xml"'
          COUNT=0
          # HEAD^ 가 없으면(최초 커밋·shallow 실패) diff 생략 → sitemap 만 전송.
          if git rev-parse --verify -q HEAD^ >/dev/null; then
            # 삭제된 페이지는 핑 제외 (--diff-filter=ACMR), 동적 세그먼트([...]) 제외.
            CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD^ HEAD -- 'src/app' \
              | grep -E '^src/app/.*page\.tsx$' || true)
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in *\[*) continue ;; esac
              path="${f#src/app}"      # 'src/app/guide/x/page.tsx' → '/guide/x/page.tsx'
              path="${path%page.tsx}"  # → '/guide/x/' (홈은 '/' — trailing slash 유지)
              URLS="$URLS, \"https://calculatorhost.com${path}\""
              COUNT=$((COUNT+1))
            done <<< "$CHANGED"
          else
            echo "HEAD^ 없음 — sitemap.xml 단독 전송"
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "url_list=[$URLS]" >> "$GITHUB_OUTPUT"
          echo "변경 페이지 $COUNT 개 + sitemap.xml: [$URLS]"

      - name: Google sitemap ping (legacy 보조 채널)
        run: |
          # 2023년 deprecated 됐지만 일부 사이트는 여전히 효과 보고됨. 무해.
          curl -fsS "https://www.google.com/ping?sitemap=https://calculatorhost.com/sitemap.xml" || echo "Google ping skipped"

      - name: Bing/Yandex IndexNow
        env:
          KEY: ${{ secrets.INDEXNOW_KEY }}
          URL_LIST: ${{ steps.changed.outputs.url_list }}
        run: |
          # secret 가드 — auto-guide-cron 의 "Check secret" 패턴 재사용 (step if 에 secrets
          # 컨텍스트는 GitHub Actions 가 거부하므로 env 경유 + bash 가드).
          if [ -z "$KEY" ]; then
            echo "INDEXNOW_KEY 미설정 — Bing/Yandex 핑 skip (Google/Naver step 은 그대로 진행)"
            exit 0
          fi
          # workflow_dispatch 등으로 changed step 출력이 비면 sitemap 단독 fallback.
          if [ -z "$URL_LIST" ]; then
            URL_LIST='["https://calculatorhost.com/sitemap.xml"]'
          fi
          # 직전 커밋에서 변경된 페이지 URL 명시 전송 + sitemap.xml 항상 포함.
          # -w "%{http_code}" 로 응답 코드를 stdout 에 명시 → 200/202 정상 / 4xx 실패 가시화.
          # IndexNow 정상: 200 (수락) / 202 (수락 + 비동기 처리). 422 (잘못된 키), 403 (키 검증 실패) 등.
          # -fsS 유지로 5xx 만 curl exit code 1, 4xx 는 본문 + http_code 로 가시화.
          # || echo 는 네트워크 단절 등 curl 자체 실패 시의 fallback (continue-on-error 추가 X).
          echo "IndexNow urlList: $URL_LIST"
          HTTP_CODE=$(curl -sS -o /tmp/indexnow.body -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"calculatorhost.com\",
              \"key\": \"$KEY\",
              \"keyLocation\": \"https://calculatorhost.com/$KEY.txt\",
              \"urlList\": $URL_LIST
            }")
          echo "IndexNow HTTP $HTTP_CODE"
          echo "IndexNow body: $(cat /tmp/indexnow.body 2>/dev/null || echo '<empty>')"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "::error::IndexNow ping failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Naver Search Advisor (수동 한정)
        run: |
          echo "Naver Search Advisor 는 사이트맵 자동 핑 미지원."
          echo "운영자가 https://searchadvisor.naver.com 에서 정기적으로 색인 요청 (월 1회)."
