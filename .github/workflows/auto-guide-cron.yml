name: auto-guide-cron

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      topic:
        description: 'topic slug (empty = auto select)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-guide:
    runs-on: ubuntu-latest
    if: ${{ vars.AUTO_GUIDE_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT 사용 — 브랜치 push 와 PR 생성을 동일 자격으로 수행 (권한 일관성).
          # GITHUB_TOKEN 으로는 createPullRequest GraphQL 거부되어 PAT 필요.
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY missing"
            exit 1
          fi

      - name: Generate draft
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          TOPIC_ARG=""
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            TOPIC_ARG="--topic ${{ github.event.inputs.topic }}"
          fi
          OUTPUT=$(node scripts/ralph-auto-guide.mjs $TOPIC_ARG)
          echo "$OUTPUT"
          STATUS=$(echo "$OUTPUT" | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>{try{console.log(JSON.parse(s).status||'unknown')}catch(e){console.log('parse-error')}})")
          SLUG=$(echo "$OUTPUT" | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>{try{console.log(JSON.parse(s).slug||'')}catch(e){console.log('')}})")
          TITLE=$(echo "$OUTPUT" | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>{try{console.log(JSON.parse(s).title||'')}catch(e){console.log('')}})")
          FILE=$(echo "$OUTPUT" | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>{try{console.log(JSON.parse(s).filePath||'')}catch(e){console.log('')}})")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Quality gate
        if: steps.generate.outputs.status == 'generated'
        run: |
          node scripts/check-guide-quality.mjs "${{ steps.generate.outputs.file }}"

      - name: Add slug to sitemap
        if: steps.generate.outputs.status == 'generated'
        run: |
          SLUG="${{ steps.generate.outputs.slug }}"
          node -e "
            const fs = require('fs');
            const path = 'src/app/sitemap.ts';
            let src = fs.readFileSync(path, 'utf8');
            const slug = process.argv[1];
            if (src.includes(\`'\${slug}'\`)) { console.log('already in sitemap'); process.exit(0); }
            src = src.replace(/(const GUIDE_SLUGS = \[[\s\S]*?)(\n\];)/, \`\$1\n  '\${slug}',\$2\`);
            fs.writeFileSync(path, src, 'utf8');
            console.log('sitemap updated');
          " "$SLUG"

      - name: Create PR
        if: steps.generate.outputs.status == 'generated'
        env:
          # PAT 사용 — GITHUB_TOKEN 은 GraphQL createPullRequest 거부 (Settings > Actions
          # > "Allow GitHub Actions to create and approve pull requests" off 시).
          # PAT(repo scope) 로 봇 외 자격으로 PR 생성 → 권한 게이트 우회.
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e
          SLUG="${{ steps.generate.outputs.slug }}"
          TITLE="${{ steps.generate.outputs.title }}"
          BRANCH="ralph/auto-guide-${SLUG}-$(date +%Y%m%d-%H%M%S)"
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "src/app/guide/${SLUG}/page.tsx" src/app/sitemap.ts
          git commit -m "feat(guide): ${SLUG} auto draft (${DATE})"
          git push origin "$BRANCH"
          # 라벨은 repo 에 없을 수 있어 별도 단계로 처리 (PR 생성 자체 실패 방지)
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "feat(guide): ${SLUG} 자동 초안 (auto-merge 활성)" \
            --body "Auto-generated draft. **Auto-merge enabled** — 모든 CI 게이트(quality-gate / lighthouse / E2E / SEO regression / Cloudflare Pages) 통과 시 자동 squash 머지 + 브랜치 삭제.\n\n**탈출구**: 머지 차단 원하면 PR 페이지에서 **Disable auto-merge** 클릭 또는 PR을 close. 검수 SLA 보호 차원에서 한 번 검토 후 결정.\n\nTopic: ${TITLE}")
          echo "PR created: $PR_URL"
          # PR 이 unstable 상태를 벗어날 때까지 최대 ~90초 대기 (status checks 등록 시간 확보).
          # gh pr create 직후 GitHub 이 status checks 를 등록하기 전이면 PR 은 UNSTABLE 상태이고
          # enablePullRequestAutoMerge GraphQL 이 거부됨. polling 으로 stable 진입 후 활성화.
          for i in $(seq 1 18); do
            STATE=$(gh pr view "$PR_URL" --json mergeStateStatus --jq '.mergeStateStatus')
            echo "merge state: $STATE (try $i)"
            if [ "$STATE" != "UNSTABLE" ] && [ "$STATE" != "UNKNOWN" ]; then break; fi
            sleep 5
          done
          # 자동 머지 활성화 — 모든 필수 status check 통과 시 자동 squash 머지 + 브랜치 삭제.
          # 게이트 fail 시 PR 은 open 상태로 남음 (안전장치). hold 원하면 운영자가 수동으로
          # "Disable auto-merge" 클릭하거나 PR close. continue-on-error 미사용 — 활성화 실패 시 fail.
          gh pr merge "$PR_URL" --auto --squash --delete-branch
          echo "Auto-merge enabled. CI 게이트 전부 green 시 자동 머지·브랜치 삭제. 차단 원하면 PR 에서 'Disable auto-merge' 클릭."
          # 라벨 적용은 best-effort (실패 무시)
          gh pr edit "$PR_URL" --add-label "ralph" 2>/dev/null || true
          gh pr edit "$PR_URL" --add-label "auto-guide" 2>/dev/null || true
          gh pr edit "$PR_URL" --add-label "automation" 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "## auto-guide-cron result" >> $GITHUB_STEP_SUMMARY
          echo "- status: ${{ steps.generate.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- slug: ${{ steps.generate.outputs.slug }}" >> $GITHUB_STEP_SUMMARY
          echo "- title: ${{ steps.generate.outputs.title }}" >> $GITHUB_STEP_SUMMARY
