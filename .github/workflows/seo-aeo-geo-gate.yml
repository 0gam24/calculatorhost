name: SEO+AEO+GEO Gate

# 신규 발행 페이지의 SEO + AEO(AI Overview) + GEO(LLM 인용) 표준 사전 검증.
# - 트리거: PR이 src/app/**/page.tsx 또는 sitemap.ts 변경
# - 검사: §N 정확도, 메타데이터+JSON-LD 정합성, §N 인용 strong 강도
# - 실패 시: PR 머지 차단

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/app/**/page.tsx'
      - 'src/app/sitemap.ts'

permissions:
  contents: read
  pull-requests: write

jobs:
  seo-aeo-geo-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 변경된 page.tsx 식별
        id: changed
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- 'src/app/**/page.tsx' | tr '\n' ' ')
          echo "files=${changed}" >> $GITHUB_OUTPUT
          echo "변경 page.tsx: ${changed}"

      - name: 법조항 §N 정확도 검증
        if: steps.changed.outputs.files != ''
        run: node scripts/validate-statute-references.mjs ${{ steps.changed.outputs.files }}

      - name: 메타데이터 + JSON-LD 정합성 검증
        if: steps.changed.outputs.files != ''
        run: node scripts/validate-guide-metadata.mjs ${{ steps.changed.outputs.files }}

      - name: §N 인용 strong 강도 (사이트 전체)
        run: npm run citations:audit
