name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_urls:
        description: 'Test URLs (comma-separated, or leave empty for defaults)'
        required: false
        default: ''
      preset:
        description: 'Device preset (mobile or desktop)'
        required: false
        default: 'mobile'
        type: choice
        options:
          - mobile
          - desktop
          - both

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Start static server
        run: |
          npx http-server out -p 4173 --gzip -c-1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          # 서버 준비 대기
          sleep 3
          curl -f http://localhost:4173/index.html > /dev/null || exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ github.token }}

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results-${{ github.run_number }}
          path: .lighthouseci/
          retention-days: 30

      - name: Save baseline on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-baseline
          path: .lighthouseci/
          retention-days: 30

      - name: Download latest baseline (PR only)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          name: lighthouse-baseline
          path: baseline-results
          if_no_artifact_found: warn
          workflow_conclusion: success
          branch: main

      - name: Compare with baseline
        if: github.event_name == 'pull_request' && always()
        run: |
          if [ -f "baseline-results/lighthouseci/lh-results.json" ]; then
            node scripts/compare-lighthouse.mjs \
              baseline-results/lighthouseci/lh-results.json \
              .lighthouseci/lh-results.json \
              > comparison-output.md || true
            
            if [ -f "comparison-output.md" ]; then
              cat comparison-output.md
            fi
          else
            echo "📌 Baseline artifact not found (first-time comparison, skipped)"
          fi

      - name: Post Lighthouse results to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = '.lighthouseci';
            const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('.json'));

            if (files.length === 0) {
              console.log('No Lighthouse JSON results found');
              return;
            }

            const results = JSON.parse(fs.readFileSync(path.join(resultsDir, files[0]), 'utf8'));
            const scores = {};

            results.forEach((result, idx) => {
              const urlKey = (result.url || `URL ${idx + 1}`).replace('http://localhost:4173', '');
              scores[urlKey] = {
                perf: Math.round(result.categories.performance.score * 100),
                a11y: Math.round(result.categories.accessibility.score * 100),
                bp: Math.round(result.categories['best-practices'].score * 100),
                seo: Math.round(result.categories.seo.score * 100),
                // Core Web Vitals
                lcp: result.audits['largest-contentful-paint']?.numericValue || null,
                inp: result.audits['interaction-to-next-paint']?.numericValue || null,
                cls: result.audits['cumulative-layout-shift']?.numericValue || null
              };
            });

            let rows = Object.entries(scores).map(([url, s]) => {
              const lcpMs = s.lcp ? (s.lcp / 1000).toFixed(2) + 's' : '—';
              const inpMs = s.inp ? (s.inp / 1000).toFixed(2) + 's' : '—';
              const clsVal = s.cls ? s.cls.toFixed(3) : '—';
              return '| ' + url + ' | ' + s.perf + ' | ' + lcpMs + ' | ' + inpMs + ' | ' + clsVal + ' |';
            }).join('\n');

            let comment = '## Lighthouse CI 결과\n\n' +
              '### 점수\n' +
              '| URL | Performance | LCP | INP | CLS |\n' +
              '|---|---|---|---|---|\n' +
              rows;

            // CWV 판정
            comment += '\n\n### Core Web Vitals 판정\n';
            comment += '| 지표 | Good | 기준 |\n';
            comment += '|---|---|---|\n';
            comment += '| LCP | ≤ 2.5s | 2.5-4.0s |\n';
            comment += '| INP | ≤ 200ms | 200-500ms |\n';
            comment += '| CLS | ≤ 0.1 | 0.1-0.25 |\n';

            // baseline 비교 결과 첨부
            if (fs.existsSync('comparison-output.md')) {
              const comparison = fs.readFileSync('comparison-output.md', 'utf8');
              comment += '\n\n## Baseline 비교\n' + comparison;
            } else {
              comment += '\n\n📌 Baseline 없음 (최초 측정). 이후 PR부터 비교 시작됨.';
            }

            comment += '\n\n---\n**판정**: Performance -5점 이상 악화 = ⚠️ 경고 | 배포는 차단하지 않으나 개선 권장';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
