<!DOCTYPE html>
<html lang="ko-KR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>오프라인 — calculatorhost</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #272A2F;
      --card: #2F3238;
      --text: #F5F6F8;
      --text-secondary: #A8ADB5;
      --primary: #595FF7;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #F7F8FA;
        --card: #FFFFFF;
        --text: #1A1D21;
        --text-secondary: #6B7280;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Pretendard', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .card {
      max-width: 480px;
      width: 100%;
      padding: 2.5rem 2rem;
      background: var(--card);
      border-radius: 1.25rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      text-align: center;
    }
    h1 { margin: 0 0 0.75rem; font-size: 1.5rem; }
    p {
      margin: 0.5rem 0;
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: var(--primary);
      border: 0;
      border-radius: 0.5rem;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    button:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .links {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(168, 173, 181, 0.2);
      font-size: 0.85rem;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인해주세요. 이전에 방문한 페이지는 캐시에서 불러올 수 있습니다.</p>
    <button type="button" onclick="location.reload()">다시 시도</button>
    <div class="links">
      <a href="/">홈으로</a>
    </div>
  </main>
</body>
</html>
